name: Build Mobile APK (Force Fix)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 关键步骤：暴力修复代码中的强制转换错误
      - name: Patch Build Script
        run: |
          # 进入项目目录
          cd simple_live_app/android/app
          # 使用 sed 命令将报错的 "as String" 这种容易崩溃的写法替换掉
          # 或者直接强行给变量赋值，绕过读取配置文件的步骤
          sed -i 's/as String/ ?: "1.0.0"/g' build.gradle.kts
          # 顺便注入基础的 local.properties 以防万一
          echo "flutter.sdk=$FLUTTER_ROOT" > ../local.properties
          echo "flutter.versionCode=1" >> ../local.properties
          echo "flutter.versionName=1.0.0" >> ../local.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./simple_live_app
        # 使用 debug 构建，它最容易成功
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-fixed
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
