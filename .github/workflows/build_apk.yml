name: Build Mobile APK (Standard Fix)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 核心修复：创建项目构建脚本正在寻找的所有属性文件
      - name: Create Property Files
        run: |
          # 1. 创建 key.properties (解决 keyAlias 等变量报错)
          # 我们填入虚拟信息，这样脚本读取时就不会返回 null 了
          cat <<EOF > simple_live_app/android/key.properties
          storePassword=password
          keyPassword=password
          keyAlias=upload
          storeFile=../app/debug.keystore
          EOF
          
          # 2. 创建 local.properties (Flutter 必需)
          echo "flutter.sdk=$FLUTTER_ROOT" > simple_live_app/android/local.properties
          echo "flutter.versionCode=1" >> simple_live_app/android/local.properties
          echo "flutter.versionName=1.0.0" >> simple_live_app/android/local.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./simple_live_app
        # 即使是打 Release 包，有了上面的虚拟配置文件通常也能成功
        # 如果 Release 还是报错，请将下面这行改为: flutter build apk --debug --no-tree-shake-icons
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app
          # 这里的路径根据上面 build 的类型（release/debug）对应修改
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
