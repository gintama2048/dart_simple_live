name: Build Mobile APK (Debug Version)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 注入基础配置，确保 Gradle 不会因为找不到文件而崩溃
      - name: Prepare Properties
        run: |
          # 在根目录和安卓目录都创建配置文件，防止脚本找不到
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "flutter.versionCode=1" >> local.properties
          echo "flutter.versionName=1.0.0" >> local.properties
          cp local.properties simple_live_app/android/local.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: ./simple_live_app
        # 关键修改：改用 debug 编译，跳过 release 的签名检查
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-debug-apk
          # 注意：Debug 模式生成的路径是 app-debug.apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
