name: Build Lite APK (Release Split)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 1. 核心修复：手搓一个真实的临时签名文件
      - name: Generate Real Keystore
        run: |
          # 创建一个真实的 .keystore 文件
          keytool -genkey -v -keystore simple_live_app/android/app/upload.keystore \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mypassword \
            -keypass mypassword \
            -dname "CN=Example, OU=Example, O=Example, L=Example, S=Example, C=US"
          
          # 将匹配的账号密码写入 key.properties
          cat <<EOF > simple_live_app/android/key.properties
          storePassword=mypassword
          keyPassword=mypassword
          keyAlias=my-key-alias
          storeFile=upload.keystore
          EOF
          
          # 写入基础配置
          echo "flutter.sdk=$FLUTTER_ROOT" > simple_live_app/android/local.properties
          echo "flutter.versionCode=1" >> simple_live_app/android/local.properties
          echo "flutter.versionName=1.0.0" >> simple_live_app/android/local.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Build Optimized APK
        working-directory: ./simple_live_app
        # --release: 丢弃调试代码，体积减小
        # --split-per-abi: 按架构拆分，体积再减小
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-optimized
          # 上传所有生成的 release 包
          path: simple_live_app/build/app/outputs/flutter-apk/*-release.apk
