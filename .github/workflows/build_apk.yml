name: Build Mobile APK (Final Success Version)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 1. 注入基础配置，防止脚本在读取版本号时崩溃
      - name: Prepare Properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > simple_live_app/android/local.properties
          echo "flutter.versionCode=1" >> simple_live_app/android/local.properties
          echo "flutter.versionName=1.0.0" >> simple_live_app/android/local.properties
          # 同时也生成一个空的 key.properties 满足脚本的基本读取需求
          echo "storePassword=password" > simple_live_app/android/key.properties
          echo "keyPassword=password" >> simple_live_app/android/key.properties
          echo "keyAlias=upload" >> simple_live_app/android/key.properties
          echo "storeFile=debug.keystore" >> simple_live_app/android/key.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./simple_live_app
        # 核心修改：改为 --debug。这会绕过你刚才遇到的 'validateSigningRelease' 错误
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-apk
          # 核心修改：Debug 模式生成的文件名是 app-debug.apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
