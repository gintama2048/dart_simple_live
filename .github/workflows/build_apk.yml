name: Build APK

on:
  workflow_dispatch: # 允许手动触发打包

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码 (升级到 v4)
      - uses: actions/checkout@v4

      # 2. 设置 Java 环境 (升级到 v4)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      # 4. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 5. 构建 APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 6. 上传 APK (关键：修复报错，升级到 v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0 # v4 新特性，不压缩以提高速度
