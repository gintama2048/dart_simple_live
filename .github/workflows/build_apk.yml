name: Build Mobile APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 关键修复步骤：注入缺失的本地配置
      - name: Fix missing properties
        working-directory: ./simple_live_app/android
        run: |
          echo "VERSION_NAME=1.0.0" > local.properties
          echo "VERSION_CODE=1" >> local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        working-directory: ./simple_live_app
        # 使用 --split-per-abi 可以生成更小的安装包，如果不想要也可以去掉
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
