name: Build Mobile APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 核心修复：多重注入配置信息
      - name: Fix missing properties
        run: |
          # 进入安卓目录
          cd simple_live_app/android
          
          # 1. 注入 local.properties (Flutter 必需)
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "flutter.versionCode=1" >> local.properties
          echo "flutter.versionName=1.0.0" >> local.properties
          
          # 2. 注入 gradle.properties (针对 Kotlin DSL 报错修复)
          # 我们把可能的变量名全部填上，防止脚本找不到
          echo "VERSION_NAME=1.0.0" >> gradle.properties
          echo "VERSION_CODE=1" >> gradle.properties
          echo "versionName=1.0.0" >> gradle.properties
          echo "versionCode=1" >> gradle.properties

      - name: Install dependencies
        working-directory: ./simple_live_app
        run: |
          flutter pub get

      - name: Build APK
        working-directory: ./simple_live_app
        # 如果 release 持续失败，可以尝试改为 flutter build apk --debug 先跑通流程
        run: flutter build apk --release --no-tree-shake-icons
        env:
          # 3. 注入环境变量 (有些脚本会从环境读取)
          VERSION_NAME: "1.0.0"
          VERSION_CODE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
