name: Build APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # 修复点：改用 channel 而不是 flutter-version，或者直接指定一个具体的版本号
          channel: 'stable' 
          cache: true
          # 如果还是报错，可以尝试取消下面这一行的注释（指定具体版本）：
          # flutter-version: '3.24.0' 

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        # 增加 --no-tree-shake-icons 是为了防止某些字体图标库在打包时报错
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app
          path: build/app/outputs/flutter-apk/app-release.apk
